<body class="bg-[#0f172a] text-slate-200 font-sans selection:bg-blue-500/30">

    <nav class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800 py-4 px-8 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">E</div>
            <span class="text-xl font-black tracking-tighter uppercase text-white">Elite Auto</span>
        </div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Advisor: <span id="advisorDisplay" class="text-blue-400">Vincent Nguyen</span></p>
    </nav>

    <header class="relative pt-20 pb-12 px-4 text-center">
        <h1 class="text-5xl font-black text-white mb-4 tracking-tight">Luxury Service <span class="gradient-text">Redefined.</span></h1>
        <p class="text-slate-400 max-w-xl mx-auto">Select a preferred maintenance tier to begin your personalized intake.</p>
    </header>

    <section class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 px-4 mb-16">
        <button id="card-Express" onclick="selectTier('Express', 185)" class="text-left bg-slate-800/50 border-2 border-slate-700 p-6 rounded-2xl hover:border-slate-500 transition">
            <h3 class="font-bold text-white">Express Care</h3>
            <p class="text-2xl font-black mt-2">$185</p>
        </button>
        <button id="card-Executive" onclick="selectTier('Executive', 450)" class="text-left bg-slate-800/50 border-2 border-blue-600 p-6 rounded-2xl selected-tier transition">
            <h3 class="font-bold text-white">Executive Plan</h3>
            <p class="text-2xl font-black mt-2">$450</p>
        </button>
        <button id="card-Performance" onclick="selectTier('Performance', 890)" class="text-left bg-slate-800/50 border-2 border-slate-700 p-6 rounded-2xl hover:border-slate-500 transition">
            <h3 class="font-bold text-white">Performance Plus</h3>
            <p class="text-2xl font-black mt-2">$890</p>
        </button>
    </section>

    <div class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden mb-20 shadow-2xl">
        <form id="intakeForm" onsubmit="handleIntake(event)" class="p-10 space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <select name="v_year" required class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none">
                    <option value="">Year</option><option>2025</option><option>2024</option><option>2023</option>
                </select>
                <select name="v_make" required class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none">
                    <option value="">Make</option><option>Porsche</option><option>BMW</option><option>Tesla</option>
                </select>
                <input name="v_trim" required placeholder="Trim" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none">
            </div>
            <textarea name="details" required placeholder="Service notes..." class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white h-32 outline-none focus:border-blue-500"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <input name="fullname" required placeholder="Full Name" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none">
                <input name="email" required type="email" placeholder="Email" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-white outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20">Authorize Request</button>
        </form>
        <div id="success" class="hidden p-20 text-center">
            <h2 class="text-3xl font-bold text-white mb-2">Request Confirmed</h2>
            <p class="text-slate-400">Your advisor will contact you shortly.</p>
        </div>
    </div>

    <script>
        const ADVISOR = "Vincent Nguyen";
        let currentTier = "Executive";

        function selectTier(tier, price) {
            currentTier = tier;
            document.querySelectorAll('button[id^="card-"]').forEach(btn => btn.classList.remove('selected-tier', 'border-blue-600'));
            document.getElementById('card-' + tier).classList.add('selected-tier', 'border-blue-600');
            analytics.track('Tier Selected', { tier, price, advisor: ADVISOR });
        }

        function handleIntake(e) {
            e.preventDefault();
            const f = e.target;
            const vehicle = `${f.v_year.value} ${f.v_make.value} ${f.v_trim.value}`;

            analytics.identify(f.email.value, { name: f.fullname.value, email: f.email.value, advisor: ADVISOR });
            analytics.track('Service Authorized', { vehicle, notes: f.details.value, tier: currentTier }, function() {
                document.getElementById('intakeForm').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
