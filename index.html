    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b p-4 px-8 flex justify-between items-center shadow-sm">
        <div class="font-black text-xl tracking-tighter">ELITE AUTO</div>
    </nav>

    <div class="max-w-4xl mx-auto py-12 px-4">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black mb-2">Service Advisor Portal</h1>
            <p class="text-gray-500">Connected to Advisor: <strong>Alex</strong></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-12">
            <button onclick="selectTier('Express', 185)" class="text-left bg-white p-6 rounded-xl border-2 border-transparent hover:border-blue-500 shadow-sm transition">
                <h3 class="font-bold">Express</h3>
                <p class="text-xs text-gray-500">$185 • 30 mins</p>
            </button>
            <button onclick="selectTier('Executive', 450)" class="text-left bg-white p-6 rounded-xl border-2 border-blue-500 shadow-sm transition">
                <h3 class="font-bold">Executive</h3>
                <p class="text-xs text-gray-500">$450 • 2 hours</p>
            </button>
            <button onclick="selectTier('Performance', 890)" class="text-left bg-white p-6 rounded-xl border-2 border-transparent hover:border-blue-500 shadow-sm transition">
                <h3 class="font-bold">Performance</h3>
                <p class="text-xs text-gray-500">$890 • 4 hours</p>
            </button>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-lg border">
            <form id="serviceForm" onsubmit="handleIntake(event)" class="space-y-4">
                <input name="vehicle" required placeholder="Vehicle (e.g. 2023 Porsche 911)" class="w-full p-3 bg-gray-50 border rounded-lg">
                <textarea name="details" required placeholder="What symptoms are you noticing?" class="w-full p-3 bg-gray-50 border rounded-lg h-32"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input name="fullname" required placeholder="Full Name" class="p-3 bg-gray-50 border rounded-lg">
                    <input name="email" required type="email" placeholder="Email Address" class="p-3 bg-gray-50 border rounded-lg">
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-lg hover:bg-gray-800 transition">
                    Send to Alex
                </button>
            </form>
            <div id="msg" class="hidden text-center py-10 font-bold text-green-600">Request Sent! Alex will contact you soon.</div>
        </div>
    </div>

    <script>
        function selectTier(name, price) {
            // Check if analytics is loaded before calling
            if (window.analytics) {
                analytics.track('Service Tier Selected', { plan: name, price: price });
            }
            alert("Tier Selected: " + name);
        }

        function handleIntake(e) {
            e.preventDefault();
            const f = e.target;
            
            if (window.analytics) {
                // Identify the user
                analytics.identify(f.email.value, {
                    name: f.fullname.value,
                    email: f.email.value
                });

                // Track the submission
                analytics.track('Service Request Submitted', {
                    vehicle: f.vehicle.value,
                    notes: f.details.value
                }, function() {
                    f.classList.add('hidden');
                    document.getElementById('msg').classList.remove('hidden');
                });
            } else {
                // Fallback if Segment is blocked by an ad-blocker
                alert("Request submitted (Tracking blocked by browser)");
                f.reset();
            }
        }
    </script>
</body>
</html>
