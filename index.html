<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Auto | The Chaotic Service Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans p-4 md:p-12">

    <div class="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-6 text-center">
            <h1 class="text-xl font-black uppercase tracking-widest text-white">Elite Auto Service Intake</h1>
            <p class="text-blue-100 text-sm mt-1">Your Advisor: <span id="advisorDisplay" class="font-bold underline italic text-yellow-300">Summoning...</span></p>
        </div>

        <form id="proIntake" onsubmit="handleFinalSubmit(event)" class="p-8 md:p-12 space-y-8">
            
            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">1. Vehicle Specification (Since 1995)</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select id="vYear" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">Year</option>
                    </select>
                    <select id="vMake" required onchange="updateModels()" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">Make</option>
                        <option value="toyota">Toyota</option>
                        <option value="honda">Honda</option>
                        <option value="nissan">Nissan</option>
                        <option value="ford">Ford</option>
                        <option value="porsche">Porsche</option>
                        <option value="bmw">BMW</option>
                    </select>
                    <select id="vModel" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">Model / Trim</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">2. Service Required</h2>
                <select id="serviceType" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <option value="">Select a Task for your Advisor...</option>
                    <optgroup label="Standard Maintenance">
                        <option value="Oil Change">Boring Oil Change</option>
                        <option value="Brake Service">Squeaky Brake Silence</option>
                        <option value="Tire Rotation">Tire Musical Chairs</option>
                    </optgroup>
                    <optgroup label="Chaotic Advisor Specials">
                        <option value="Spark Plug Fire Show">Spark Plug Fire Show 🎆</option>
                        <option value="Muffler Upgrade">Muffler Megaphone Upgrade 📣</option>
                        <option value="Engine Light Exorcism">Check Engine Light Exorcism 🕯️</option>
                        <option value="Blinker Fluid Refill">Premium Blinker Fluid Refill 💧</option>
                        <option value="Turbo Whistle Install">Turbo Whistle Installation 🌬️</option>
                    </optgroup>
                </select>
                <textarea id="details" placeholder="Any additional symptoms or chaotic details?" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white h-24 outline-none focus:border-blue-500"></textarea>
            </div>

            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">3. Personal Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="fName" required placeholder="First Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <input id="mName" placeholder="Middle Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <input id="lName" required placeholder="Last Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="phone" required type="tel" placeholder="Phone Number" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <input id="email" required type="email" placeholder="Email Address" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">4. Client's Address</h2>
                <input id="street" required placeholder="Street Name" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="city" required placeholder="City" class="bg-slate-800 border border-slate-700 p-3 rounded-lg text-white outline-none focus:border-blue-500">
                    <input id="state" required placeholder="State (e.g. ID)" class="bg-slate-800 border border-slate-700 p-3 rounded-lg text-white outline-none focus:border-blue-500">
                    <input id="zip" required placeholder="Zip Code" class="bg-slate-800 border border-slate-700 p-3 rounded-lg text-white outline-none focus:border-blue-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-widest py-6 rounded-2xl transition shadow-xl shadow-blue-900/40 transform hover:scale-105 active:scale-95">
                Send to the Chaos Portal
            </button>
        </form>

        <div id="successCard" class="hidden p-20 text-center space-y-4">
            <div class="text-6xl">🏎️💨</div>
            <h2 class="text-3xl font-black text-white">Intake Dispatched!</h2>
            <p id="funnyFollowUp" class="text-slate-400 italic text-lg"></p>
        </div>
    </div>

    <script>
        // 1. Hilarious Advisor Generator
        const funnyAdvisors = [
            { name: "Sir Lugnut the Rusty", quote: "I promise I only have three leftover screws this time." },
            { name: "The Check Engine Light Whisperer", quote: "Your car told me its secrets. It was mostly just screaming." },
            { name: "Count Piston of Mufflershire", quote: "Your transmission is a tragedy, but we shall make it a symphony." },
            { name: "Spark Plug Sally", quote: "Let's give this engine some personality and fire!" },
            { name: "Brake Pad Brad", quote: "Stopping is just a suggestion, but I'll help you anyway." },
            { name: "Oil Slick Rick", quote: "I am 40% synthetic blend myself at this point." }
        ];

        const randomAdvisor = funnyAdvisors[Math.floor(Math.random() * funnyAdvisors.length)];
        document.getElementById('advisorDisplay').innerText = randomAdvisor.name;
        document.getElementById('funnyFollowUp').innerText = `${randomAdvisor.name} says: "${randomAdvisor.quote}"`;

        // 2. Year Logic (1995 - 2026)
        const yearSelect = document.getElementById('vYear');
        for (let y = 2026; y >= 1995; y--) {
            let opt = document.createElement('option');
            opt.value = y; opt.textContent = y;
            yearSelect.appendChild(opt);
        }

        // 3. Massive Model Database
        const modelRepo = {
            toyota: ["Supra (A80)", "Camry XSE", "Corolla GR", "Tacoma TRD Pro", "RAV4 Prime", "4Runner Limited"],
            honda: ["NSX (Classic)", "Civic Type R", "Accord Sport", "CR-V Hybrid", "S2000", "Odyssey (Elite)"],
            nissan: ["GT-R Nismo", "Skyline R34", "370Z", "Z Performance", "Altima SR", "Titan XD"],
            ford: ["F-150 Raptor", "Mustang GT", "Bronco Badlands", "Explorer ST", "Crown Vic (Police)", "GT40"],
            porsche: ["911 GT3 RS", "Taycan Turbo S", "Cayenne Turbo", "Macan GTS", "718 Cayman"],
            bmw: ["M3 CS", "M5 Competition", "X5 M", "i7 xDrive60", "Z4 M40i", "850CSi"]
        };

        function updateModels() {
            const make = document.getElementById('vMake').value;
            const modelSelect = document.getElementById('vModel');
            modelSelect.innerHTML = '<option value="">Model / Trim</option>';
            if(make && modelRepo[make]) {
                modelRepo[make].forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
            }
        }

        // 4. Submission Logic (Fixed for Button)
        function handleFinalSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            const clientTraits = {
                firstName: document.getElementById('fName').value,
                middleName: document.getElementById('mName').value,
                lastName: document.getElementById('lName').value,
                phone: document.getElementById('phone').value,
                email: email,
                address: {
                    street: document.getElementById('street').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    zip: document.getElementById('zip').value
                },
                vehicle: {
                    year: document.getElementById('vYear').value,
                    make: document.getElementById('vMake').value,
                    model: document.getElementById('vModel').value
                },
                service_requested: document.getElementById('serviceType').value,
                chaotic_notes: document.getElementById('details').value,
                assigned_chaos_advisor: randomAdvisor.name
            };

            // Identify and then Track with a UI fallback
            if (window.analytics) {
                analytics.identify(email, clientTraits);
                analytics.track('Chaos Intake Authorized', clientTraits, function() {
                    showSuccess();
                });
                // Fallback in case the track callback hangs
                setTimeout(showSuccess, 1000);
            } else {
                showSuccess(); // Work even if Segment is blocked
            }
        }

        function showSuccess() {
            document.getElementById('proIntake').classList.add('hidden');
            document.getElementById('successCard').classList.remove('hidden');
        }
    </script>
</body>
</html>
