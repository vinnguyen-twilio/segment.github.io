    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .selected-tier { border-color: #3b82f6 !important; background-color: rgba(30, 41, 59, 0.8) !important; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans p-4 md:p-12">

    <div class="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-6 text-center">
            <h1 class="text-xl font-black uppercase tracking-widest text-white">Elite Auto Service Intake</h1>
            <p class="text-blue-100 text-sm mt-1">Your Advisor: <span id="advisorDisplay" class="font-bold underline italic text-yellow-300">Summoning...</span></p>
        </div>

        <div id="mainContent">
            <div class="p-8 pb-0">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic mb-4">Select Service Level</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button type="button" onclick="selectTier('Express', 185)" id="tier-Express" class="tier-card text-left bg-slate-800/40 border-2 border-slate-700 p-5 rounded-2xl transition-all hover:border-slate-500">
                        <p class="font-bold text-white">Express</p>
                        <p class="text-2xl font-black">$185</p>
                    </button>
                    <button type="button" onclick="selectTier('Executive', 450)" id="tier-Executive" class="tier-card text-left bg-slate-800/40 border-2 border-blue-600 p-5 rounded-2xl selected-tier transition-all">
                        <p class="font-bold text-white">Executive</p>
                        <p class="text-2xl font-black">$450</p>
                    </button>
                    <button type="button" onclick="selectTier('Performance', 890)" id="tier-Performance" class="tier-card text-left bg-slate-800/40 border-2 border-slate-700 p-5 rounded-2xl transition-all hover:border-slate-500">
                        <p class="font-bold text-white">Performance</p>
                        <p class="text-2xl font-black">$890</p>
                    </button>
                </div>
            </div>

            <form id="proIntake" onsubmit="handleFinalSubmit(event)" class="p-8 md:p-12 space-y-8">
                <div class="space-y-4">
                    <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">1. Vehicle Specification</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <select id="vYear" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none"></select>
                        <select id="vMake" required onchange="updateModels()" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                            <option value="">Make</option>
                            <option value="toyota">Toyota</option><option value="honda">Honda</option><option value="ford">Ford</option>
                            <option value="porsche">Porsche</option><option value="bmw">BMW</option>
                        </select>
                        <select id="vModel" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                            <option value="">Model / Trim</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">2. Personal Details</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input id="fName" required placeholder="First Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        <input id="mName" placeholder="Middle Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                        <input id="lName" required placeholder="Last Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="flex">
                            <select id="countryCode" class="bg-slate-800 border border-slate-700 p-4 rounded-l-xl text-white outline-none border-r-0">
                                <option value="+1">+1 (US)</option><option value="+44">+44 (UK)</option>
                            </select>
                            <input id="phone" required type="tel" pattern="[0-9]{10,15}" placeholder="Phone" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-r-xl text-white outline-none focus:border-blue-500">
                        </div>
                        <input id="email" required type="email" placeholder="Email Address" class="md:col-span-2 bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">3. Client's Address</h2>
                    <input id="street" required placeholder="Street Name" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input id="city" required placeholder="City" class="bg-slate-800 border border-slate-700 p-3 rounded-lg text-white">
                        <select id="state" required class="bg-slate-800 border border-slate-700 p-3 rounded-lg text-white outline-none">
                            <option value="">State</option><option>ID</option><option>CA</option><option>NY</option><option>TX</option>
                        </select>
                        <input id="zip" required pattern="[0-9]{5}" placeholder="Zip Code" class="bg-slate-800 border border-slate-700 p-3 rounded-lg text-white">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-widest py-6 rounded-2xl transition shadow-xl shadow-blue-900/40">
                    Send to the Chaos Portal
                </button>
            </form>
        </div>

        <div id="successCard" class="hidden p-12 text-center space-y-6">
            <h2 class="text-3xl font-black text-white italic">"DILLON! YOU SON OF A BITCH!"</h2>
            <div class="flex justify-center">
                <iframe src="https://giphy.com/embed/Ke3mE4qjnU9pIVaLpI" width="480" height="270" frameBorder="0" class="giphy-embed rounded-2xl border-4 border-blue-600" allowFullScreen></iframe>
            </div>
            <p id="funnyFollowUp" class="text-slate-400 font-bold"></p>
            <button onclick="location.reload()" class="bg-white text-black font-black uppercase tracking-widest px-8 py-4 rounded-xl hover:bg-slate-200 transition">
                Submit Another Request
            </button>
        </div>
    </div>

    <script>
        const funnyAdvisors = [
            { name: "Sir Lugnut the Rusty", quote: "I promise I only have three leftover screws." },
            { name: "Spark Plug Sally", quote: "Let's give this engine some fire!" }
        ];

        const randomAdvisor = funnyAdvisors[Math.floor(Math.random() * funnyAdvisors.length)];
        document.getElementById('advisorDisplay').innerText = randomAdvisor.name;

        // Initialize Years
        const yearSelect = document.getElementById('vYear');
        yearSelect.innerHTML = '<option value="">Year</option>';
        for (let y = 2026; y >= 1995; y--) {
            let opt = document.createElement('option');
            opt.value = y; opt.textContent = y;
            yearSelect.appendChild(opt);
        }

        const modelRepo = {
            toyota: ["Supra", "Camry"], honda: ["Civic", "NSX"], ford: ["Raptor", "Mustang"],
            porsche: ["911 GT3", "Taycan"], bmw: ["M3", "M5"]
        };

        function updateModels() {
            const make = document.getElementById('vMake').value;
            const modelSelect = document.getElementById('vModel');
            modelSelect.innerHTML = '<option value="">Model / Trim</option>';
            if(make && modelRepo[make]) {
                modelRepo[make].forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
            }
        }

        let selectedTier = "Executive";
        function selectTier(name, price) {
            selectedTier = name;
            document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected-tier'));
            document.getElementById('tier-' + name).classList.add('selected-tier');
            if(window.analytics) {
                analytics.track('Service Tier Interaction', { tier: name, price: price });
            }
        }

        function handleFinalSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const traits = {
                firstName: document.getElementById('fName').value,
                phone: document.getElementById('countryCode').value + document.getElementById('phone').value,
                email: email,
                tier_selected: selectedTier,
                assigned_chaos_advisor: randomAdvisor.name
            };

            if (window.analytics) {
                analytics.identify(email, traits);
                analytics.track('Chaos Intake Authorized', traits);
            }
            
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('successCard').classList.remove('hidden');
            document.getElementById('funnyFollowUp').innerText = `${randomAdvisor.name} says: "${randomAdvisor.quote}"`;
        }
    </script>
</body>
</html>
