<body class="bg-slate-50 font-sans text-slate-900">
    <div class="max-w-2xl mx-auto py-12 px-4">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-slate-800">Elite Automotive Service Advisor</h1>
            <p class="text-slate-600 mt-2">Connect with our virtual coordinator, Alex, to manage your vehicle's maintenance.</p>
        </header>

        <form name="serviceRequest" onsubmit="identify(event)" class="bg-white shadow-sm border border-slate-200 rounded-lg p-8 space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Vehicle Year, Make, & Model</label>
                <input name="vehicle" required class="w-full border border-slate-300 p-3 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" type="text" placeholder="e.g., 2023 Porsche 911"/>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Service Details or Symptoms</label>
                <textarea name="details" required class="w-full border border-slate-300 p-3 rounded-md h-32 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Describe what your vehicle needs..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Full Name</label>
                    <input name="fullname" required class="w-full border border-slate-300 p-3 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" type="text" placeholder="Jane Doe"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Email Address</label>
                    <input name="email" required class="w-full border border-slate-300 p-3 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" type="email" placeholder="jane@example.com"/>
                </div>
            </div>

            <button name="submit" type="submit" class="w-full bg-slate-900 text-white font-bold py-3 px-6 rounded-md hover:bg-slate-800 transition-colors">
                Submit to Alex
            </button>
        </form>
        
        <p id="successMsg" class="hidden mt-6 text-center text-green-700 font-medium">
            Thank you! Alex is reviewing your vehicle details now.
        </p>
    </div>

    <script type="text/javascript">
      function identify(e){
        e.preventDefault();
        var form = e.target;
        var email = form["email"].value;
        var fullname = form["fullname"].value;
        var vehicle = form["vehicle"].value;
        var details = form["details"].value;

        // 1. Identify: Link the session to a specific user profile using Email as ID
        analytics.identify(email, {
            name: fullname,
            email: email,
            vehicleModel: vehicle,
            last_inquiry_type: "Service Request"
        });

        // 2. Track: Record the specific event for your agent to respond to
        analytics.track('Service Request Submitted', {
            vehicle: vehicle,
            service_notes: details,
            submission_url: window.location.href
        }, function() {
            // UI Feedback
            form.classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('successMsg').classList.remove('hidden');
        });
      }
    </script>
</body>
</html>
