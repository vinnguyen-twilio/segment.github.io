<!DOCTYPE html> 
<html> 
<head> 
    <title>Home Questionnaire</title> 
</head> 
<body> 
<h1>What is your favorite place to travel?</h1> 
<p>I am building a directory of the sweetest travel destinations.</p>  

<form name="travel" onsubmit="identify(event)">
    What is your favorite travel destination?
    <input name="destination" required="" size="81" type="text" onblur="trackDestination(this.value)"/> 
    <br><br>
    Any recommendations (cool things to do, places to visit or restaurants to eat)? 
    <br><br> 
    <textarea cols="81" name="details" required="" rows="10"></textarea> 
    <br><br> 
    Name: <input name="fullname" required="" size="75" type="text"/> 
    <br><br> 
    Email: <input name="email" required="" size="75" type="email"/> 
    <br><br>
    <input name="submit" type="submit" value="Submit Destination"/>
</form> 

<script type="text/javascript">
  // Track when a user finishes typing a destination
  function trackDestination(value) {
    if(value) {
      analytics.track('Destination Entered', { destination: value });
    }
  }

  function identify(e){
    e.preventDefault();
    var form = e.target;
    var email = form["email"].value;
    var fullname = form["fullname"].value;
    var destination = form["destination"].value;
    var details = form["details"].value;

    // FIX: Use the email as the Unique ID instead of '1234'
    analytics.identify(email, {
        email: email, 
        name: fullname,
        favorite_destination: destination
    });

    // Track the final submission
    analytics.track('Destination Submitted', {
        destination: destination, 
        recommendations: details
    }, function() {
        // Provide feedback and refresh
        alert("Thank you, " + fullname + "! Your destination has been added.");
        window.location.reload();
    });
  }
</script>
</body> 
</html>
