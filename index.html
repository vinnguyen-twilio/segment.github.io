<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Auto | The Chaotic Service Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans p-4 md:p-12">

    <div class="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-purple-600 to-blue-600 p-6 text-center">
            <h1 class="text-xl font-black uppercase tracking-widest text-white">Elite Auto Service Intake</h1>
            <p class="text-blue-100 text-sm mt-1">Your Advisor: <span id="advisorDisplay" class="font-bold underline italic text-yellow-300">Summoning...</span></p>
        </div>

        <form id="proIntake" onsubmit="handleFinalSubmit(event)" class="p-8 md:p-12 space-y-8">
            
            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">1. Vehicle Specification</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select id="vYear" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">Year</option>
                    </select>
                    <select id="vMake" required onchange="updateModels()" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">Make</option>
                        <option value="toyota">Toyota</option><option value="honda">Honda</option><option value="nissan">Nissan</option><option value="ford">Ford</option><option value="porsche">Porsche</option><option value="bmw">BMW</option>
                    </select>
                    <select id="vModel" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">Model / Trim</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">2. Service Required</h2>
                <select id="serviceType" required class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <option value="">Select a Task for your Advisor...</option>
                    <optgroup label="Standard Maintenance">
                        <option value="Oil Change">Boring Oil Change</option>
                        <option value="Brake Service">Squeaky Brake Silence</option>
                    </optgroup>
                    <optgroup label="Chaotic Advisor Specials">
                        <option value="Spark Plug Fire Show">Spark Plug Fire Show 🎆</option>
                        <option value="Muffler Upgrade">Muffler Megaphone Upgrade 📣</option>
                        <option value="Blinker Fluid Refill">Premium Blinker Fluid Refill 💧</option>
                    </optgroup>
                </select>
            </div>

            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">3. Personal Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input id="fName" required placeholder="First Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <input id="mName" placeholder="Middle Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <input id="lName" required placeholder="Last Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex">
                        <select id="countryCode" class="bg-slate-800 border border-slate-700 p-4 rounded-l-xl text-white outline-none border-r-0">
                            <option value="+1">+1 (USA)</option><option value="+44">+44 (UK)</option><option value="+61">+61 (AUS)</option>
                        </select>
                        <input id="phone" required type="tel" pattern="[0-9]{10,15}" title="Please enter at least 10 digits" placeholder="Phone" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-r-xl text-white outline-none focus:border-blue-500">
                    </div>
                    <input id="email" required type="email" placeholder="Email Address" class="md:col-span-2 bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-blue-400 text-xs font-bold uppercase tracking-tighter italic">4. Client's Address</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="street" required placeholder="Street Name" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <input id="city" required placeholder="City" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select id="state" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="">State</option><option>ID</option><option>CA</option><option>NY</option><option>TX</option><option>WA</option>
                    </select>
                    <input id="zip" required pattern="[0-9]{5}" title="5-digit zip code" placeholder="Zip Code" class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                    <select id="country" required class="bg-slate-800 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-blue-500">
                        <option value="USA">USA</option><option value="Canada">Canada</option><option value="UK">UK</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-widest py-6 rounded-2xl transition shadow-xl shadow-blue-900/40">
                Send to the Chaos Portal
            </button>
        </form>

        <div id="successCard" class="hidden p-12 text-center space-y-6">
            <h2 class="text-3xl font-black text-white italic">"DILLON! YOU SON OF A BITCH!"</h2>
            <div class="flex justify-center">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW9ueW56bmR6bmR6bmR6bmR6bmR6bmR6bmR6bmR6bmR6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/Ke3mE4qjnU9pIVaLpI/giphy.gif" alt="Arnold Dillon Handshake" class="rounded-2xl border-4 border-blue-600 shadow-2xl max-w-full">
            </div>
            <p id="funnyFollowUp" class="text-slate-400 font-bold"></p>
            <div class="pt-6 border-t border-slate-800">
                <p class="text-sm text-slate-500 mb-4">Want to test your luck again?</p>
                <button onclick="location.reload()" class="bg-white text-black font-black uppercase tracking-widest px-8 py-4 rounded-xl hover:bg-slate-200 transition">
                    Submit Another Service Request
                </button>
            </div>
        </div>
    </div>

    <script>
        const funnyAdvisors = [
            { name: "Sir Lugnut the Rusty", quote: "I promise I only have three leftover screws this time." },
            { name: "The Check Engine Light Whisperer", quote: "Your car told me its secrets. It was mostly just screaming." },
            { name: "Count Piston of Mufflershire", quote: "Your transmission is a tragedy, but we shall make it a symphony." }
        ];

        const randomAdvisor = funnyAdvisors[Math.floor(Math.random() * funnyAdvisors.length)];
        document.getElementById('advisorDisplay').innerText = randomAdvisor.name;

        const yearSelect = document.getElementById('vYear');
        for (let y = 2026; y >= 1995; y--) {
            let opt = document.createElement('option');
            opt.value = y; opt.textContent = y;
            yearSelect.appendChild(opt);
        }

        const modelRepo = {
            toyota: ["Supra", "Camry", "Tacoma"], honda: ["Civic Type R", "NSX"],
            nissan: ["GT-R", "Z"], ford: ["Raptor", "Mustang"],
            porsche: ["911 GT3", "Taycan"], bmw: ["M3", "M5"]
        };

        function updateModels() {
            const make = document.getElementById('vMake').value;
            const modelSelect = document.getElementById('vModel');
            modelSelect.innerHTML = '<option value="">Model / Trim</option>';
            if(make && modelRepo[make]) {
                modelRepo[make].forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
            }
        }

        function handleFinalSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const fullPhone = document.getElementById('countryCode').value + document.getElementById('phone').value;
            
            const traits = {
                firstName: document.getElementById('fName').value,
                email: email,
                phone: fullPhone,
                address: {
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    country: document.getElementById('country').value
                },
                assigned_chaos_advisor: randomAdvisor.name
            };

            if (window.analytics) {
                analytics.identify(email, traits);
                analytics.track('Chaos Intake Authorized', traits, function() {
                    showSuccess();
                });
                setTimeout(showSuccess, 1000);
            } else {
                showSuccess();
            }
        }

        function showSuccess() {
            document.getElementById('proIntake').classList.add('hidden');
            document.getElementById('successCard').classList.remove('hidden');
            document.getElementById('funnyFollowUp').innerText = `${randomAdvisor.name} says: "${randomAdvisor.quote}"`;
        }
    </script>
</body>
</html>
