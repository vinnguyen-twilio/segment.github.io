<html lang="en">
<head>

    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .success { display: none; color: #4ade80; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Elite Auto Portal</h1>
        <p>Advisor: <strong>Vincent Nguyen</strong></p>
        <form id="intake" onsubmit="handle(event)">
            <select name="year" required><option value="">Year</option><option>2025</option><option>2024</option></select>
            <select name="make" required><option value="">Make</option><option>Porsche</option><option>BMW</option></select>
            <input name="trim" required placeholder="Model/Trim (e.g. 911)">
            <textarea name="notes" required placeholder="Service notes..."></textarea>
            <input name="name" required placeholder="Full Name">
            <input name="email" required type="email" placeholder="Email Address">
            <button type="submit">Submit to Advisor</button>
        </form>
        <div id="status" class="success">Request Sent! Alex is reviewing your data.</div>
    </div>
    <script>
        function handle(e) {
            e.preventDefault();
            const f = e.target;
            const vehicle = f.year.value + " " + f.make.value + " " + f.trim.value;
            analytics.identify(f.email.value, { name: f.name.value, email: f.email.value });
            analytics.track('Service Requested', { vehicle: vehicle, notes: f.notes.value }, function() {
                document.getElementById('intake').style.display = 'none';
                document.getElementById('status').style.display = 'block';
            });
        }
    </script>
</body>
</html>
